<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | Kimi's Petal Atelier</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .cancel-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .cancel-card {
            background: white;
            padding: 4rem;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-card">
            <h1>Payment Cancelled</h1>
            <p>Your order was not placed. Don't worry, your cart is still waiting for you if you'd like to try again.</p>
            <a href="index.html" class="btn btn-secondary">Back to My Cart</a>
        </div>
    </div>
</body>
</html>
